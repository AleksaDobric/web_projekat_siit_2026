<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – Knjige</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Admin Panel – Knjige</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="author-list.html">Authors</a>
    <a href="admin-books.html">Admin Books</a>
    <a href="admin-authors.html">Admin Authors</a>
    <a href="profile.html">Profile</a>
</nav>

<main>

    <!-- DELETE CONFIRMATION MODAL -->
    <div id="delete-modal-overlay" class="modal-overlay hidden">
        <div class="modal-box modal-box--small">
            <h3>Potvrda brisanja</h3>
            <p>Da li ste sigurni da želite da obrišete ovu knjigu? Ova akcija se ne može poništiti.</p>
            <div class="modal-actions">
                <button id="btn-confirm-delete" class="btn-danger">Obriši</button>
                <button id="btn-cancel-delete" class="btn-secondary">Otkaži</button>
            </div>
        </div>
    </div>

    <h2>Lista knjiga</h2>
    <div id="books-table-container"><p>Učitavanje...</p></div>

    <hr>

    <h2>Dodaj novu knjigu</h2>
    <form id="add-book-form" novalidate>
        <label>Naziv *</label>
        <input type="text" id="add-naziv" placeholder="Naziv knjige">
        <span class="field-error" id="err-add-naziv"></span>

        <label>Opis *</label>
        <textarea id="add-opis" placeholder="Opis knjige" rows="3"></textarea>
        <span class="field-error" id="err-add-opis"></span>

        <label>Žanr *</label>
        <input type="text" id="add-zanr" placeholder="npr. Sci-Fi">
        <span class="field-error" id="err-add-zanr"></span>

        <label>Format</label>
        <input type="text" id="add-format" placeholder="npr. Meki povez">

        <label>Cena (RSD) *</label>
        <input type="number" id="add-cena" placeholder="npr. 1500" min="0">
        <span class="field-error" id="err-add-cena"></span>

        <label>Broj strana *</label>
        <input type="number" id="add-strana" placeholder="npr. 320" min="1">
        <span class="field-error" id="err-add-strana"></span>

        <label>ISBN * <small>(format: 978-XX-XXXX-XXX-X ili 9788612345678)</small></label>
        <input type="text" id="add-isbn" placeholder="978-86-7543-123-4">
        <span class="field-error" id="err-add-isbn"></span>

        <label>ID Autora</label>
        <select id="add-autor"><option value="">— Izaberi autora —</option></select>
        <span class="field-error" id="err-add-autor"></span>

        <label>Slike (URL-ovi, jedan po liniji)</label>
        <textarea id="add-slike" placeholder="https://..." rows="3"></textarea>

        <button type="submit" class="btn-primary">Dodaj knjigu</button>
        <span class="field-error" id="err-add-general"></span>
    </form>

    <hr>

    <!-- EDIT FORM (hidden until Edit is clicked) -->
    <div id="edit-section" class="hidden">
        <h2>Izmeni knjigu</h2>
        <form id="edit-book-form" novalidate>
            <input type="hidden" id="edit-id">

            <label>Naziv *</label>
            <input type="text" id="edit-naziv">
            <span class="field-error" id="err-edit-naziv"></span>

            <label>Opis *</label>
            <textarea id="edit-opis" rows="3"></textarea>
            <span class="field-error" id="err-edit-opis"></span>

            <label>Žanr *</label>
            <input type="text" id="edit-zanr">
            <span class="field-error" id="err-edit-zanr"></span>

            <label>Format</label>
            <input type="text" id="edit-format">

            <label>Cena (RSD) *</label>
            <input type="number" id="edit-cena" min="0">
            <span class="field-error" id="err-edit-cena"></span>

            <label>Broj strana *</label>
            <input type="number" id="edit-strana" min="1">
            <span class="field-error" id="err-edit-strana"></span>

            <label>ISBN *</label>
            <input type="text" id="edit-isbn">
            <span class="field-error" id="err-edit-isbn"></span>

            <label>Autor</label>
            <select id="edit-autor"><option value="">— Izaberi autora —</option></select>

            <label>Slike (URL-ovi, jedan po liniji)</label>
            <textarea id="edit-slike" rows="3"></textarea>

            <button type="submit" class="btn-primary">Sačuvaj izmene</button>
            <button type="button" id="btn-cancel-edit" class="btn-secondary">Otkaži</button>
            <span class="field-error" id="err-edit-general"></span>
        </form>
    </div>

</main>

<footer>
    <p>Web Dizajn Projekat 2026</p>
</footer>

<div id="toast" class="toast"></div>

<script type="module" src="js/admin-books.js"></script>
</body>
</html>
