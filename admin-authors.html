<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Authors</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Админ Панел - Аутори</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="author-list.html">Authors</a>
    <a href="admin-books.html">Admin Books</a>
    <a href="admin-authors.html">Admin Authors</a>
    <a href="profile.html">Profile</a>
</nav>

<main>

    <h2>Листа Аутора</h2>

    <div class="actions">
        <button id="open-add">➕ Додај аутора</button>
    </div>

    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>Име</th>
                <th>Презиме</th>
                <th>Датум рођења</th>
                <th>Статус</th>
                <th>Број освојених награда</th>
                <th>Број продатих примерака</th>
                <th>Контакт телефон менаџера</th>
                <th>Опције</th>
            </tr>
        </thead>

    <tbody id="authors-table-body">

    </tbody>
</table>

<div id="add-modal" class="modal">
  <div class="modal-content">

    <h2>Додај аутора</h2>

    <form id="add-author-form">
        <input type="text" name="name" placeholder="Име"><br><br>
        <input type="text" name="surname" placeholder="Презиме (није обавезно)"><br><br>
        <input type="date" name="date"><br><br>

        <select name="status">
            <option value="disable" disabled selected>Статус</option>
            <option value="Активан">Активан</option>
            <option value="У пензији">У пензији</option>
            <option value="Преминуо">Преминуо</option>
        </select><br><br>

        <input type="number" name="awards" placeholder="Број освојених награда"><br><br>
        <input type="number" name="sold" placeholder="Број продатих примерака"><br><br>
        <input type="text" name="phone" placeholder="Контакт телефон менаџера (+381 65 123-4567)"><br><br>
        <input type="text" name="image" placeholder="Слика (URL)"><br><br>

        <textarea name="bio" placeholder="Биографија"></textarea><br><br>

        <button type="button">Додај аутора</button>
    </form>

  </div>
</div>

<div id="edit-modal" class="modal">
  <div class="modal-content">

    <h2>Измени аутора</h2>

    <form id="edit-author-form">
         <input type="text" name="name" placeholder="Име"><br><br>
        <input type="text" name="surname" placeholder="Презиме (није обавезно)"><br><br>
        <input type="date" name="date"><br><br>

        <select name="status">
            <option value="disable" disabled selected>Статус</option>
            <option value="Активан">Активан</option>
            <option value="У пензији">У пензији</option>
            <option value="Преминуо">Преминуо</option>
        </select><br><br>

        <input type="number" name="awards" placeholder="Број освојених награда"><br><br>
        <input type="number" name="sold" placeholder="Број продатих примерака"><br><br>
        <input type="text" name="phone" placeholder="Контакт телефон менаџера (+381 65 123-4567)"><br><br>
        <input type="text" name="image" placeholder="Слика (URL)"><br><br>

        <textarea name="bio" placeholder="Биографија"></textarea><br><br>

        <button type="button">Сачувај измене</button>
    </form>

  </div>
</div>

</main>

<footer>
    <p>Web Dizajn Projekat 2026</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="js/firebase.js"></script>
<script src="js/admin-authors.js"></script>

<div id="toast" class="toast"></div>

</body>
</html>
