<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Authors</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <h1>Админ Панел - Аутори</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="author-list.html">Authors</a>
    <a href="admin-books.html">Admin Books</a>
    <a href="admin-authors.html">Admin Authors</a>
    <a href="profile.html">Profile</a>
</nav>

<main>

    <h2>Листа Аутора</h2>

    <table border="1" cellpadding="8">
        <thead>
            <tr>
                <th>Име</th>
                <th>Презиме</th>
                <th>Датум рођења</th>
                <th>Статус</th>
                <th>Награде</th>
                <th>Број продатих копија</th>
                <th>Контакт телефон менаџера</th>
                <th>Акције</th>
            </tr>
        </thead>

    <tbody id="authors-table-body">

    </tbody>
</table>

    <hr>

    <h2>Додај Новог Аутора</h2>

    <form id="add-author-form">
        <input type="text" name="name" placeholder="Име"><br><br>
        <input type="text" name="surname" placeholder="Презиме"><br><br>
        <input type="date" name="date" placeholder="Датум рођења"><br><br>

        <select name="status" placeholder="Статус">
            <option value="Активан">Активан</option>
            <option value="У пензији">У пензији</option>
            <option value="Преминуо">Преминуо</option>
        </select><br><br>

        <input type="number" name="awards" placeholder="Број освојених награда"><br><br>
        <input type="number" name="sold" placeholder="Број продатих копија"><br><br>
        <input type="text" name="phone" placeholder="Контакт телефон менаџера"><br><br>

        <textarea name="bio" placeholder="Биографија"></textarea><br><br>

        <button type="button">Додај аутора</button>
    </form>

    <hr>

    <h2>Измени Аутора</h2>
    
    <form id="edit-author-form">
        <input type="text" name="name" placeholder="Име"><br><br>
        <input type="text" name="surname" placeholder="Презиме"><br><br>
        <input type="date" name="date" placeholder="Датум рођења"><br><br>

        <select name="status" placeholder="Статус">
            <option value="Активан">Активан</option>
            <option value="У пензији">У пензији</option>
            <option value="Преминуо">Преминуо</option>
        </select><br><br>
        
        <input type="number" name="awards" placeholder="Број освојених награда"><br><br>
        <input type="number" name="sold" placeholder="Број продатих копија"><br><br>
        <input type="text" name="phone" placeholder="Контакт телефон менаџера"><br><br>

        <textarea name="bio" placeholder="Биографија"></textarea><br><br>

        <button type="button">Сачувај измене</button>
    </form>

</main>

<footer>
    <p>Web Dizajn Projekat 2026</p>
</footer>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="js/firebase.js"></script>
<script src="js/admin-authors.js"></script>

<div id="toast" class="toast"></div>

</body>
</html>
